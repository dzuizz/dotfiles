# tmux config — read from ~/.config/tmux/tmux.conf (tmux >= 3.1)

# --- pane resize ---
# macOS uses Ctrl+Arrows for Mission Control / window switching, which
# shadows tmux's default prefix+C-Arrows resize. Use vim-style h/j/k/l
# instead. -r makes them repeatable: press the prefix once, then hold
# (or repeat) the direction key within repeat-time to keep resizing.
unbind -T prefix C-Up
unbind -T prefix C-Down
unbind -T prefix C-Left
unbind -T prefix C-Right

bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
